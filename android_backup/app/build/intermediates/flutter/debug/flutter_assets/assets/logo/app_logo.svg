<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f53844"/>
      <stop offset="100%" style="stop-color:#ff8c42"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#feca57"/>
    </linearGradient>
    <linearGradient id="clockFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="5" stdDeviation="10" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background shape - rounded hexagon -->
  <g filter="url(#softShadow)">
    <polygon points="300,40 470,130 470,310 300,400 130,310 130,130" fill="url(#bgGrad)" stroke="url(#accentGrad)" stroke-width="3"/>
  </g>

  <!-- Decorative corner accents -->
  <path d="M160 150 L180 150 L180 170" fill="none" stroke="#ff8c42" stroke-width="2" opacity="0.6"/>
  <path d="M440 150 L420 150 L420 170" fill="none" stroke="#ff8c42" stroke-width="2" opacity="0.6"/>
  <path d="M160 350 L180 350 L180 330" fill="none" stroke="#ff8c42" stroke-width="2" opacity="0.6"/>
  <path d="M440 350 L420 350 L420 330" fill="none" stroke="#ff8c42" stroke-width="2" opacity="0.6"/>

  <!-- Main icon group -->
  <g transform="translate(300, 210)">

    <!-- Clock base circle -->
    <circle cx="0" cy="0" r="95" fill="url(#clockFace)" stroke="url(#accentGrad)" stroke-width="4" filter="url(#neonGlow)"/>

    <!-- Inner decorative ring -->
    <circle cx="0" cy="0" r="85" fill="none" stroke="#ff8c42" stroke-width="1" opacity="0.3" stroke-dasharray="4,6"/>

    <!-- Calendar icon integrated (top left of clock) -->
    <g transform="translate(-65, -65)">
      <rect x="-18" y="-22" width="36" height="36" rx="5" fill="none" stroke="#f53844" stroke-width="2.5"/>
      <rect x="-18" y="-14" width="36" height="28" rx="0" fill="none" stroke="#f53844" stroke-width="2.5"/>
      <line x1="-10" y1="-22" x2="-10" y2="-28" stroke="#f53844" stroke-width="2" stroke-linecap="round"/>
      <line x1="10" y1="-22" x2="10" y2="-28" stroke="#f53844" stroke-width="2" stroke-linecap="round"/>
      <text x="0" y="2" text-anchor="middle" fill="#f53844" font-size="12" font-family="Arial" font-weight="bold">30</text>
    </g>

    <!-- Lecture/Attendance icon (top right of clock) -->
    <g transform="translate(65, -65)">
      <rect x="-18" y="-22" width="36" height="36" rx="5" fill="none" stroke="#feca57" stroke-width="2.5"/>
      <text x="0" y="-8" text-anchor="middle" fill="#feca57" font-size="10" font-family="Arial" font-weight="bold">A+</text>
    </g>

    <!-- PG/House icon (bottom) -->
    <g transform="translate(0, 80)">
      <path d="M-18,-5 L-8,-12 L0,-18 L8,-12 L18,-5 L18,15 L-18,15 Z" fill="none" stroke="#6c5ce7" stroke-width="2.5" stroke-linejoin="round"/>
      <rect x="-6" y="4" width="12" height="11" rx="1.5" fill="none" stroke="#6c5ce7" stroke-width="2"/>
    </g>

    <!-- Clock hands -->
    <!-- Hour hand (pointing to ~10) -->
    <line x1="0" y1="0" x2="-40" y2="-55" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
    <!-- Minute hand (pointing to ~2) -->
    <line x1="0" y1="0" x2="45" y2="-35" stroke="#fff" stroke-width="3" stroke-linecap="round"/>

    <!-- Clock center -->
    <circle cx="0" cy="0" r="5" fill="#ff8c42"/>
    <circle cx="0" cy="0" r="2" fill="#fff"/>

    <!-- Hour markers -->
    <g font-family="Arial, sans-serif" font-weight="bold" fill="#fff" font-size="13" text-anchor="middle">
      <text x="0" y="-70">12</text>
      <text x="40" y="-58">1</text>
      <text x="65" y="-30">2</text>
      <text x="72" y="3">3</text>
      <text x="65" y="35">4</text>
      <text x="40" y="63">5</text>
      <text x="0" y="76">6</text>
      <text x="-40" y="63">7</text>
      <text x="-65" y="35">8</text>
      <text x="-72" y="3">9</text>
      <text x="-65" y="-30">10</text>
      <text x="-40" y="-58">11</text>
    </g>

    <!-- Tick marks -->
    <g stroke="#fff" stroke-width="1.5" opacity="0.5">
      <line x1="0" y1="-82" x2="0" y2="-75"/>
      <line x1="41" y1="-71" x2="39" y2="-64"/>
      <line x1="71" y1="-41" x2="66" y2="-36"/>
      <line x1="82" y1="0" x2="75" y2="0"/>
      <line x1="71" y1="41" x2="66" y2="36"/>
      <line x1="41" y1="71" x2="39" y2="64"/>
      <line x1="0" y1="82" x2="0" y2="75"/>
      <line x1="-41" y1="71" x2="-39" y2="64"/>
      <line x1="-71" y1="41" x2="-66" y2="36"/>
      <line x1="-82" y1="0" x2="-75" y2="0"/>
      <line x1="-71" y1="-41" x2="-66" y2="-36"/>
      <line x1="-41" y1="-71" x2="-39" y2="-64"/>
    </g>
  </g>

  <!-- App name: CAMPUS -->
  <text x="300" y="370" text-anchor="middle" fill="#fff" font-size="42" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-weight="800" letter-spacing="6" filter="url(#softShadow)">
    CAMPUS
  </text>

  <!-- App name: CLOCK with gradient -->
  <text x="300" y="415" text-anchor="middle" fill="url(#accentGrad)" font-size="42" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-weight="800" letter-spacing="6" filter="url(#neonGlow)">
    CLOCK
  </text>

  <!-- Features ribbon -->
  <g transform="translate(300, 445)">
    <rect x="-160" y="-12" width="320" height="24" rx="12" fill="rgba(255,140,66,0.15)" stroke="rgba(255,140,66,0.3)" stroke-width="1"/>
    <text x="0" y="4" text-anchor="middle" fill="#ff8c42" font-size="11" font-family="'Segoe UI', Arial, sans-serif" font-weight="600" letter-spacing="1.5">
      📅 TIMETABLE • 📝 ATTENDANCE • 🏠 PG FINDER • 📚 ASSIGNMENTS • 💬 CHAT
    </text>
  </g>

  <!-- Bottom decorative wave -->
  <path d="M100 480 Q200 470 300 480 Q400 490 500 480" fill="none" stroke="url(#accent2)" stroke-width="2" opacity="0.4"/>
  <path d="M120 490 Q220 485 300 492 Q380 499 480 490" fill="none" stroke="url(#accent2)" stroke-width="1" opacity="0.2"/>

  <!-- Floating particles -->
  <circle cx="130" cy="280" r="2" fill="#ff8c42" opacity="0.5">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="470" cy="250" r="2.5" fill="#f53844" opacity="0.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="160" cy="350" r="1.5" fill="#feca57" opacity="0.4">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="440" cy="370" r="2" fill="#6c5ce7" opacity="0.4">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3.5s" repeatCount="indefinite"/>
  </circle>
</svg>