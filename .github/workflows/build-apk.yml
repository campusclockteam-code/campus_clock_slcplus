name: Build Flutter APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'
        channel: 'stable'
    
    - name: Create local.properties
      run: |
        echo "flutter.sdk=${{ runner.tool_cache }}/flutter" > android/local.properties
        echo "flutter.versionCode=1" >> android/local.properties
        echo "flutter.versionName=1.0.0" >> android/local.properties
    
    - name: Create google-services.json
      run: |
        mkdir -p android/app/src/main
        echo '{"project_info":{"project_number":"123456789012","project_id":"dummy"},"client":[{"client_info":{"mobilesdk_app_id":"1:123456789012:android:12345678901234567890","android_client_info":{"package_name":"com.example.campus_clock_slc"}},"api_key":[{"current_key":"AIzaSyDummy"}]}]}' > android/app/google-services.json
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Build with Gradle directly
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleRelease --stacktrace
    
    - name: List APK files
      if: always()
      run: |
        echo "=== APK files ==="
        find . -name "*.apk" -type f
        echo "=== Build outputs ==="
        ls -la android/app/build/outputs/ || echo "No outputs"
