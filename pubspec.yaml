name: campus_clock_slc
description: Campus Clock app for Shyam Lal College.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0
  firebase_messaging: ^15.1.0

  cupertino_icons: ^1.0.8
  flutter_local_notifications: ^17.0.0
  flutter_svg: ^2.0.10
  google_fonts: ^6.2.1

  qr_flutter: ^4.1.0
  mobile_scanner: ^5.0.0

  shared_preferences: ^2.3.0
  path_provider: ^2.1.3
  path: ^1.9.0
  sqflite: ^2.3.3

  intl: ^0.19.0
  url_launcher: ^6.3.0
  image_picker: ^1.1.0
  printing: ^5.12.0
  share_plus: ^10.0.0
  fl_chart: ^0.68.0
  webview_flutter: ^4.8.0
  async: ^2.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo/app_logo.svg
